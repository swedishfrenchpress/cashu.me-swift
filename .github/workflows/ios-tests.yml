name: iOS Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    paths:
      - 'ios/**'
      - 'CI/**'
      - '.github/workflows/ios-tests.yml'
  workflow_dispatch:

concurrency:
  group: ios-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  NUTSHELL_MINT_URL: http://localhost:3338
  CDK_MINT_URL: http://127.0.0.1:3339

jobs:
  unit-tests:
    name: iOS Unit & Mint Integration Tests
    runs-on: macos-26
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode version
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26.5'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache Swift packages
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/SourcePackages
        key: xcode-spm-macos-26-arm64-26.5-${{ hashFiles('ios/CashuWallet.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}

    - name: Setup mints
      run: |
        set -euo pipefail
        chmod +x CI/setup-nutshell.sh CI/setup-cdk.sh

        ./CI/setup-nutshell.sh &
        NUTSHELL_SETUP_PID=$!
        ./CI/setup-cdk.sh &
        CDK_SETUP_PID=$!

        STATUS=0
        wait "$NUTSHELL_SETUP_PID" || STATUS=$?
        wait "$CDK_SETUP_PID" || STATUS=$?
        exit "$STATUS"

    - name: Start mints
      run: |
        set -euo pipefail
        chmod +x CI/start-nutshell.sh CI/start-cdk.sh

        ./CI/start-nutshell.sh &
        NUTSHELL_START_PID=$!
        ./CI/start-cdk.sh &
        CDK_START_PID=$!

        STATUS=0
        wait "$NUTSHELL_START_PID" || STATUS=$?
        wait "$CDK_START_PID" || STATUS=$?
        exit "$STATUS"

    # Ad-hoc signing ("-") on the simulator applies the app entitlements
    # (keychain-access-groups) without a team/profile — required so the wallet
    # can write its mnemonic to the Keychain during tests.
    - name: Build iOS unit tests
      run: |
        set -euo pipefail

        SIMULATOR_UDID="$(
          xcrun simctl list devices available -j |
            jq -r '[.devices | to_entries[] | select(.key | contains("iOS")) | .value[] | select(.name == "iPhone 17" and .isAvailable == true)] | last | .udid // empty'
        )"
        if [ -z "$SIMULATOR_UDID" ]; then
          echo "iPhone 17 simulator is not available"
          exit 1
        fi
        echo "SIMULATOR_UDID=$SIMULATOR_UDID" >> "$GITHUB_ENV"

        xcrun simctl boot "$SIMULATOR_UDID" 2>/dev/null || true
        xcrun simctl bootstatus "$SIMULATOR_UDID" -b > "$RUNNER_TEMP/simulator-boot.log" 2>&1 &
        SIMULATOR_BOOT_PID=$!

        xcodebuild build-for-testing \
          -project ios/CashuWallet.xcodeproj \
          -scheme CashuWallet \
          -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" \
          -derivedDataPath "$RUNNER_TEMP/CashuWalletDerivedData" \
          -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages" \
          -skipPackageUpdates \
          -skipPackagePluginValidation \
          -showBuildTimingSummary \
          -only-testing:CashuWalletTests \
          COMPILER_INDEX_STORE_ENABLE=NO \
          CODE_SIGNING_ALLOWED=YES CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="-" \
          | tee build-output.log | xcbeautify

        if ! wait "$SIMULATOR_BOOT_PID"; then
          cat "$RUNNER_TEMP/simulator-boot.log"
          exit 1
        fi

    - name: Run iOS unit & mint integration tests
      run: |
        set -o pipefail
        xcodebuild test-without-building \
          -project ios/CashuWallet.xcodeproj \
          -scheme CashuWallet \
          -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" \
          -derivedDataPath "$RUNNER_TEMP/CashuWalletDerivedData" \
          -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages" \
          -skipPackagePluginValidation \
          -only-testing:CashuWalletTests \
          -parallel-testing-enabled NO \
          -resultBundlePath "$RUNNER_TEMP/CashuWalletUnitTests.xcresult" \
          CODE_SIGNING_ALLOWED=YES CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="-" \
          | tee ios-test-output.log | xcbeautify

    - name: Stop mints
      if: always()
      run: |
        chmod +x CI/stop-nutshell.sh CI/stop-cdk.sh
        ./CI/stop-nutshell.sh &
        NUTSHELL_STOP_PID=$!
        ./CI/stop-cdk.sh &
        CDK_STOP_PID=$!
        wait "$NUTSHELL_STOP_PID" || true
        wait "$CDK_STOP_PID" || true

    - name: Upload test results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: ios-unit-test-results-${{ github.sha }}
        path: |
          build-output.log
          *-test-output.log
          ${{ runner.temp }}/CashuWalletUnitTests.xcresult
          ${{ runner.temp }}/simulator-boot.log

    - name: Upload mint logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: ios-unit-mint-logs-${{ github.sha }}
        path: |
          CI/.nutshell.log
          CI/.cdk.log

  ui-tests:
    name: iOS UI Tests
    runs-on: macos-26
    timeout-minutes: 45

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode version
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26.5'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache Swift packages
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/SourcePackages
        key: xcode-spm-macos-26-arm64-26.5-${{ hashFiles('ios/CashuWallet.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}

    - name: Setup mints
      run: |
        set -euo pipefail
        chmod +x CI/setup-nutshell.sh CI/setup-cdk.sh

        ./CI/setup-nutshell.sh &
        NUTSHELL_SETUP_PID=$!
        ./CI/setup-cdk.sh &
        CDK_SETUP_PID=$!

        STATUS=0
        wait "$NUTSHELL_SETUP_PID" || STATUS=$?
        wait "$CDK_SETUP_PID" || STATUS=$?
        exit "$STATUS"

    - name: Start mints
      run: |
        set -euo pipefail
        chmod +x CI/start-nutshell.sh CI/start-cdk.sh

        ./CI/start-nutshell.sh &
        NUTSHELL_START_PID=$!
        ./CI/start-cdk.sh &
        CDK_START_PID=$!

        STATUS=0
        wait "$NUTSHELL_START_PID" || STATUS=$?
        wait "$CDK_START_PID" || STATUS=$?
        exit "$STATUS"

    # Ad-hoc signing ("-") on the simulator applies the app entitlements
    # (keychain-access-groups) without a team/profile — required so the wallet
    # can write its mnemonic to the Keychain during UI tests.
    - name: Build iOS UI tests
      run: |
        set -euo pipefail

        SIMULATOR_UDID="$(
          xcrun simctl list devices available -j |
            jq -r '[.devices | to_entries[] | select(.key | contains("iOS")) | .value[] | select(.name == "iPhone 17" and .isAvailable == true)] | last | .udid // empty'
        )"
        if [ -z "$SIMULATOR_UDID" ]; then
          echo "iPhone 17 simulator is not available"
          exit 1
        fi
        echo "SIMULATOR_UDID=$SIMULATOR_UDID" >> "$GITHUB_ENV"

        xcrun simctl boot "$SIMULATOR_UDID" 2>/dev/null || true
        xcrun simctl bootstatus "$SIMULATOR_UDID" -b > "$RUNNER_TEMP/simulator-boot.log" 2>&1 &
        SIMULATOR_BOOT_PID=$!

        xcodebuild build-for-testing \
          -project ios/CashuWallet.xcodeproj \
          -scheme CashuWallet \
          -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" \
          -derivedDataPath "$RUNNER_TEMP/CashuWalletDerivedData" \
          -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages" \
          -skipPackageUpdates \
          -skipPackagePluginValidation \
          -showBuildTimingSummary \
          -only-testing:CashuWalletUITests \
          COMPILER_INDEX_STORE_ENABLE=NO \
          CODE_SIGNING_ALLOWED=YES CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="-" \
          | tee build-output.log | xcbeautify

        if ! wait "$SIMULATOR_BOOT_PID"; then
          cat "$RUNNER_TEMP/simulator-boot.log"
          exit 1
        fi

    - name: Run iOS UI tests
      run: |
        set -o pipefail
        xcodebuild test-without-building \
          -project ios/CashuWallet.xcodeproj \
          -scheme CashuWallet \
          -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" \
          -derivedDataPath "$RUNNER_TEMP/CashuWalletDerivedData" \
          -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages" \
          -skipPackagePluginValidation \
          -only-testing:CashuWalletUITests \
          -parallel-testing-enabled YES \
          -maximum-parallel-testing-workers 2 \
          -resultBundlePath "$RUNNER_TEMP/CashuWalletUITests.xcresult" \
          CODE_SIGNING_ALLOWED=YES CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="-" \
          | tee ios-test-output.log | xcbeautify

    - name: Stop mints
      if: always()
      run: |
        chmod +x CI/stop-nutshell.sh CI/stop-cdk.sh
        ./CI/stop-nutshell.sh &
        NUTSHELL_STOP_PID=$!
        ./CI/stop-cdk.sh &
        CDK_STOP_PID=$!
        wait "$NUTSHELL_STOP_PID" || true
        wait "$CDK_STOP_PID" || true

    - name: Upload test results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: ios-ui-test-results-${{ github.sha }}
        path: |
          build-output.log
          *-test-output.log
          ${{ runner.temp }}/CashuWalletUITests.xcresult
          ${{ runner.temp }}/simulator-boot.log

    - name: Upload mint logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: ios-ui-mint-logs-${{ github.sha }}
        path: |
          CI/.nutshell.log
          CI/.cdk.log
